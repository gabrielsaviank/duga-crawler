services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  crawler:
    build: .
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/duga_crawler
      LOG_LEVEL: info
      CRAWLER_USER_AGENT: DugaCrawler/1.0 gabriel@companio.ee
    restart: unless-stopped

volumes:
  mongo_data: