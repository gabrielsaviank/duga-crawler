services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

  crawler:
    build: .
    depends_on:
      - mongo
    env_file:
      - .env
    restart: unless-stopped

volumes:
  mongo_data: